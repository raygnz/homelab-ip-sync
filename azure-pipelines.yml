trigger: none

pool:
  name: self-hosted-nuc
  demands:
    - Agent.OS -equals Linux

variables:
  AZURE_SUBSCRIPTION: "AzureServiceConnection-SP"
  BACKEND_RG: "rg-homelab-backend-prod"
  BACKEND_SA: "stquht6a84zm"
  STATE_KEY: "homelab-ip-sync.tfstate"

stages:
  - stage: Terraform
    displayName: "Deploy IP Sync Function"
    jobs:
        displayName: "Terraform Apply"
        steps:

          - task: TerraformInstaller@0
            displayName: "Install Terraform"
            inputs:
              terraformVersion: "latest"

          - task: TerraformTask@5
            displayName: "Terraform Init"
            inputs:
              provider: "azurerm"
              command: "init"
              backendServiceArm: $(AZURE_SUBSCRIPTION)
              backendAzureRmResourceGroupName: $(BACKEND_RG)
              backendAzureRmStorageAccountName: $(BACKEND_SA)
              backendAzureRmContainerName: "tfstate"
              backendAzureRmKey: $(STATE_KEY)


          - script: |
              cd function
              zip -r ../function.zip . -x '*.DS_Store' -x '__MACOSX' -x '._*'
            displayName: 'Package Function App'

          stages:
            - stage: Terraform
              displayName: "Deploy IP Sync Function"
              jobs:
                - job: terraform_apply
                  displayName: "Terraform Apply"
                  steps:
                    - task: TerraformInstaller@0
                      displayName: "Install Terraform"
                      inputs:
                        terraformVersion: "latest"

                    - script: |
                        cd function
                        zip -r ../function.zip . -x '*.DS_Store' -x '__MACOSX' -x '._*'
                      displayName: 'Package Function App'

                    - task: AzureCLI@2
                      displayName: 'Upload function.zip to blob'
                      inputs:
                        azureSubscription: $(AZURE_SUBSCRIPTION)
                        scriptType: bash
                        scriptLocation: inlineScript
                        inlineScript: |
                          az storage blob upload \
                            --account-name $(BACKEND_SA) \
                            --container-name function-releases \
                            --name function.zip \
                            --file ../function.zip \
                            --overwrite

                    - task: TerraformTask@5
                      displayName: "Terraform Plan"
                      inputs:
                        provider: "azurerm"
                        command: "plan"
                        environmentServiceNameAzureRM: $(AZURE_SUBSCRIPTION)
                        commandOptions: "-out=tfplan"

                    - task: TerraformTask@5
                      displayName: "Terraform Apply"
                      inputs:
                        provider: "azurerm"
                        command: "apply"
                        environmentServiceNameAzureRM: $(AZURE_SUBSCRIPTION)
                backendServiceArm: $(AZURE_SUBSCRIPTION)
                backendAzureRmResourceGroupName: $(BACKEND_RG)
                backendAzureRmStorageAccountName: $(BACKEND_SA)
                backendAzureRmContainerName: "tfstate"
                backendAzureRmKey: $(STATE_KEY)
            - task: TerraformTask@5
              displayName: "Terraform Destroy"
              inputs:
                provider: "azurerm"
                command: "destroy"
                environmentServiceNameAzureRM: $(AZURE_SUBSCRIPTION)
                commandOptions: "-auto-approve"
      approval:
        - name: ManualApproval
          type: Manual
          instructions: "Approve to run Terraform Destroy. This will delete all managed resources."
              commandOptions: "-auto-approve tfplan"