trigger: none

pool:
  name: self-hosted-nuc
  demands:
    - Agent.OS -equals Linux

variables:
  AZURE_SUBSCRIPTION: "AzureServiceConnection-SP"
  BACKEND_RG: "rg-homelab-backend-prod"
  BACKEND_SA: "sahomelabbackendprod"
  STATE_KEY: "homelab-ip-sync.tfstate"

stages:

  # =========================================================
  # Stage 1 — Terraform Infra
  # =========================================================
  - stage: Deploy
    displayName: "Deploy IP Sync Infrastructure"
    jobs:

      - job: terraform_apply
        displayName: "Terraform Apply"
        steps:

          - task: TerraformInstaller@0
            inputs:
              terraformVersion: latest

          - task: TerraformTask@5
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: $(AZURE_SUBSCRIPTION)
              backendAzureRmResourceGroupName: $(BACKEND_RG)
              backendAzureRmStorageAccountName: $(BACKEND_SA)
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: $(STATE_KEY)
              workingDirectory: "$(Build.SourcesDirectory)"

          - task: TerraformTask@5
            inputs:
              provider: azurerm
              command: apply
              backendServiceArm: $(AZURE_SUBSCRIPTION)
              environmentServiceNameAzureRM: $(AZURE_SUBSCRIPTION)
              commandOptions: "-auto-approve"
              workingDirectory: "$(Build.SourcesDirectory)"

          # Export Terraform output as a job output variable
          - task: AzureCLI@2
            name: exportOutputs
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: "$(Build.SourcesDirectory)"
              inlineScript: |
                APP_NAME=$(terraform output -raw function_app_name)
                echo "##vso[task.setvariable variable=function_app_name;isOutput=true]$APP_NAME"
                echo "Exported function_app_name = $APP_NAME"

  # =========================================================
  # Stage 2 — Deploy Function Code (remoteBuild)
  # =========================================================
  - stage: DeployFunction
    displayName: "Deploy Function Code"
    dependsOn: Deploy

    variables:
      # Convert job output → runtime variable
      function_app_name: $[
        stageDependencies.Deploy.terraform_apply.outputs['exportOutputs.function_app_name']
        ]

    jobs:

      - job: deploy_flex_function
        displayName: "Deploy to Flex Consumption"
        steps:

          - script: |
              cd $(Build.SourcesDirectory)/function
              zip -r ../function-src.zip function_app.py host.json requirements.txt
            displayName: "Package Function Source (decorator model root layout)"

          - script: |
              echo "Resolved function_app_name = $(function_app_name)"
            displayName: "DEBUG — Show resolved app name"

          - task: AzureFunctionApp@2
            displayName: "Deploy via remoteBuild"
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              appType: functionAppLinux
              appName: "$(function_app_name)"
              package: "$(Build.SourcesDirectory)/function-src.zip"
              deploymentMethod: remoteBuild
